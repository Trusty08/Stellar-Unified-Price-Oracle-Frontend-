name: PR Preview Deploy

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        run: |
          npm ci
          npm run build

      - name: Deploy to Netlify (if configured)
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && env.NETLIFY_AUTH_TOKEN
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx netlify deploy --dir=dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --json > netlify-deploy.json || true

      - name: Deploy to Vercel (if configured)
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && env.VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel --token "$VERCEL_TOKEN" --confirm --prod --log-level error --scope ${{ secrets.VERCEL_ORG_ID }} || true
