name: Supply Chain Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC for continuous monitoring
    - cron: '0 6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # for uploading SARIF / audit results

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # ── 1. Dependency integrity: npm ci verifies every integrity hash ──────
      - name: Install with integrity verification
        run: npm ci

      # ── 2. Vulnerability audit ─────────────────────────────────────────────
      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit (all deps, non-blocking report)
        run: npm audit --audit-level=critical || true

      # ── 3. Generate SBOM ───────────────────────────────────────────────────
      - name: Generate CycloneDX SBOM
        run: node scripts/generate-sbom.js --out sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90

      # ── 4. Deterministic build with SOURCE_DATE_EPOCH ─────────────────────
      - name: Build (deterministic)
        env:
          SOURCE_DATE_EPOCH: '0'
          NODE_ENV: production
        run: npm run build

      # ── 5. Hash manifest ──────────────────────────────────────────────────
      - name: Generate build hash manifest
        run: node scripts/build-hash.js

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest-${{ github.sha }}
          path: dist/build-manifest.json
          retention-days: 90

      # ── 6. Build attestation via SLSA/GitHub provenance ──────────────────
      # GitHub Actions automatically generates OIDC-backed provenance for
      # artifacts uploaded with actions/upload-artifact@v4 when the workflow
      # is run with `permissions: attestations: write id-token: write`.
      # We emit a lightweight JSON attestation as a build artifact here;
      # full Sigstore/Rekor integration requires the attest-build-provenance
      # action which needs GITHUB_TOKEN with id-token scope.
      - name: Generate build attestation
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node --input-type=module - <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs'
          import { createHash } from 'node:crypto'

          const manifest = JSON.parse(readFileSync('dist/build-manifest.json', 'utf8'))
          const artifactHash = createHash('sha256')
            .update(JSON.stringify(manifest))
            .digest('hex')

          const attestation = {
            _type: 'https://in-toto.io/Statement/v0.1',
            predicateType: 'https://slsa.dev/provenance/v0.2',
            subject: [{
              name: 'stellar-oracle-frontend',
              digest: { sha256: artifactHash }
            }],
            predicate: {
              builder: { id: `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}` },
              buildType: 'https://github.com/actions/runner',
              invocation: {
                configSource: {
                  uri: `git+https://github.com/${process.env.GITHUB_REPOSITORY}`,
                  digest: { sha1: process.env.GITHUB_SHA },
                  entryPoint: process.env.GITHUB_WORKFLOW,
                }
              },
              metadata: {
                buildStartedOn: new Date().toISOString(),
                completeness: { parameters: false, environment: false, materials: false },
                reproducible: true,
              },
              materials: [{ uri: `git+https://github.com/${process.env.GITHUB_REPOSITORY}`, digest: { sha1: process.env.GITHUB_SHA } }]
            }
          }

          writeFileSync('build-attestation.json', JSON.stringify(attestation, null, 2) + '\n')
          console.log('✓ Attestation written.')
          EOF

      - name: Upload build attestation
        uses: actions/upload-artifact@v4
        with:
          name: attestation-${{ github.sha }}
          path: build-attestation.json
          retention-days: 90

      # ── 7. Dependency drift check: lockfile must be committed ─────────────
      - name: Check lockfile is up-to-date
        run: |
          npm install --ignore-scripts --package-lock-only
          git diff --exit-code package-lock.json || (echo "::error::package-lock.json is out of date. Run 'npm install' and commit the lockfile." && exit 1)
